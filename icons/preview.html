<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Toronto Landmark Icons</title>
    <style>
      body {
        margin: 0;
        background: #f5f8fb;
        color: #18202f;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        display: grid;
        gap: 18px;
        padding: 28px;
      }

      h1 {
        margin: 0;
        font-size: 1.4rem;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
        gap: 12px;
      }

      .tile {
        border: 1px solid #d4dee9;
        border-radius: 8px;
        background: #fff;
        display: grid;
        gap: 10px;
        justify-items: center;
        padding: 16px;
      }

      img {
        width: 64px;
        height: 64px;
        image-rendering: pixelated;
      }

      span {
        font-size: 0.8rem;
        font-weight: 800;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Toronto Landmark Icons</h1>
      <div class="grid">
        <div class="tile"><img src="./cn-tower.svg" alt="" /><span>CN Tower</span></div>
        <div class="tile"><img src="./bmo-field.svg?v=2" alt="" /><span>BMO Field</span></div>
        <div class="tile"><img src="./union-station.svg?v=2" alt="" /><span>Union</span></div>
        <div class="tile"><img src="./city-hall.svg" alt="" /><span>City Hall</span></div>
        <div class="tile"><img src="./st-lawrence-market.svg" alt="" /><span>St. Lawrence</span></div>
        <div class="tile"><img src="./rom.svg?v=2" alt="" /><span>ROM</span></div>
        <div class="tile"><img src="./distillery.svg" alt="" /><span>Distillery</span></div>
        <div class="tile"><img src="./harbourfront-ferry.svg" alt="" /><span>Ferry</span></div>
        <div class="tile"><img src="./scotiabank-arena.svg?v=2" alt="" /><span>Scotiabank</span></div>
        <div class="tile"><img src="./rogers-centre.svg?v=2" alt="" /><span>Rogers Centre</span></div>
      </div>
    </main>
  </body>
</html>
